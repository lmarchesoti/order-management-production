# app
app.kafka.topic=product.a.orders

# Product A
# kafka
producta.kafka.bootstrap-servers=localhost:9092
producta.kafka.consumer-group-id=orders-management-consumer
producta.kafka.consumer-auto-offset-reset=earliest
producta.kafka.listener-ack-mode=record
producta.kafka.auto-startup=false

# database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true