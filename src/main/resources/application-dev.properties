# app

# kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=orders-management-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.value.default.type=dev.lmarchesoti.ordermanagement.adapter.producta.dto.ProductAOrder
spring.kafka.consumer.properties.spring.json.trusted.packages=dev.lmarchesoti.ordermanagement.adapter.producta.dto
spring.kafka.listener.ack-mode=record

# database
spring.datasource.url=jdbc:postgresql://localhost:5432/ordermanagement
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=ordermanagement_user
spring.datasource.password=ordermanagement

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect